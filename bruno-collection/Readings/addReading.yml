info:
  name: addReading
  type: http
  seq: 3

http:
  method: POST
  url: "{{backendBaseUrl}}/api/meters/{{meterId}}/readings"
  body:
    type: json
    data: |-
      {
        "value": 33.4,
        "unit": "KWH",
        "takenAt": ""
      }
  auth: inherit

runtime:
  variables:
    - name: meterId
      value: "1"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

info:
  name: login
  type: http
  seq: 1

http:
  method: POST
  url: "{{backendBaseUrl}}/auth/login"
  body:
    type: json
    data: |-
      {
        "email": "{{email}}",
        "password": "{{password}}"
      }

runtime:
  scripts:
    - type: after-response
      code: bru.setEnvVar("accessToken", res(".accessToken"));

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
